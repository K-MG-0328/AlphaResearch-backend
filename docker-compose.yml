version: "3.9"

services:
  # 1. FastAPI 앱
  fastapi:
    image: ghcr.io/${REPO_USER}/fastapi-app:latest
    container_name: alpharesearch_fastapi
    ports:
      - "${PORT:-33333}:${PORT:-33333}"
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    restart: always
    networks:
      - multi-agent-net

  # 2. Redis
  redis:
    image: redis:8.2
    container_name: alpharesearch_redis
    restart: always
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    networks:
      - multi-agent-net

  # 3. PostgreSQL + pgvector
  postgres:
    image: pgvector/pgvector:pg17
    container_name: alpharesearch_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eddi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eddi@123}
      POSTGRES_DB: ${POSTGRES_DB:-vectordb}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - multi-agent-net

# 볼륨 정의
volumes:
  redis_data:
  postgres_data:

# 네트워크 정의
networks:
  multi-agent-net:
    driver: bridge
